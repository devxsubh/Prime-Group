name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run test:run

  e2e:
    runs-on: ubuntu-latest
    env:
      CI: "true"
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Check Supabase secrets for E2E
        id: supabase
        run: |
          if [ -n "$NEXT_PUBLIC_SUPABASE_URL" ] && [ -n "$NEXT_PUBLIC_SUPABASE_ANON_KEY" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "E2E skipped: NEXT_PUBLIC_SUPABASE_URL and NEXT_PUBLIC_SUPABASE_ANON_KEY not set. Add them as repository secrets (Settings → Secrets and variables → Actions) to run E2E. Get values from https://supabase.com/dashboard/project/_/settings/api"
          fi
      - uses: actions/setup-node@v4
        if: steps.supabase.outputs.ready == 'true'
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
        if: steps.supabase.outputs.ready == 'true'
      - run: npx playwright install --with-deps chromium
        if: steps.supabase.outputs.ready == 'true'
      - run: npm run test:e2e
        if: steps.supabase.outputs.ready == 'true'
